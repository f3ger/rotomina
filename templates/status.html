{% extends "base.html" %}

{% block content %}
<div x-data="statusPage()" x-init="init()" x-cloak data-pogo-latest="{{ pogo_latest }}"
    data-pogo-previous="{{ pogo_previous }}"
    data-pogo-auto-update-enabled="{% if config.pogo_auto_update_enabled %}true{% else %}false{% endif %}"
    data-pif-auto-update-enabled="{% if config.pif_auto_update_enabled %}true{% else %}false{% endif %}"
    data-apk-type="{{ apk_type }}">
    <!-- Header with status information -->
    <div class="flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center mb-6">
        <div class="min-w-0">
            <h1 class="text-2xl font-bold text-white">
                Device Overview
                <span class="relative inline-flex h-3 w-3 ml-2"
                    :class="connection.status === 'connected' ? 'bg-green-500' : (connection.status === 'connecting' ? 'bg-yellow-500' : 'bg-red-500')"
                    x-tooltip="connection.status">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
                        :class="connection.status === 'connected' ? 'bg-green-400' : (connection.status === 'connecting' ? 'bg-yellow-400' : 'bg-red-400')"></span>
                </span>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                    :class="connection.status === 'connected' ? 'bg-green-100 text-green-800' : (connection.status === 'connecting' ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800')"
                    x-text="connection.statusText"></span>
                <span class="hidden sm:inline text-sm text-gray-400 ml-2"
                    x-text="'Last updated: ' + lastUpdated"></span>
            </h1>

            <div class="sm:hidden text-sm text-gray-400" x-text="'Last updated: ' + lastUpdated"></div>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-3">
            <!-- APK Type Selector with Version -->
            <div class="relative flex items-center gap-2">
                <select x-model="apkType" @change="changeApkType()"
                    class="appearance-none border text-white text-sm rounded-md px-3 py-2 pr-8 focus:outline-none focus:ring-2 focus:border-blue-500"
                    :class="apkType === 'google' ? 'bg-blue-900/50 border-blue-600 focus:ring-blue-500' : 'bg-purple-900/50 border-purple-600 focus:ring-purple-500'">
                    <option value="google">Google (G) - .apkm</option>
                    <option value="samsung">Samsung (S) - .apk</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </div>
            </div>

            <button type="button" @click="pogoUpdateAll()"
                class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <span>PoGo Update All</span>
            </button>

            <button type="button" @click="refreshData()"
                class="inline-flex items-center px-4 py-2 border border-gray-700 text-sm font-medium rounded-md text-gray-200 bg-gray-800 hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" :class="{ 'animate-spin': isRefreshing }">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Update status indicators -->
    <div class="flex flex-col sm:flex-row sm:justify-end mb-4">
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-2 w-full sm:w-auto">
            <span
                class="inline-flex items-center justify-between px-3 py-1 rounded-md text-sm font-medium w-full sm:w-auto"
                :class="pifAutoUpdateEnabled ? 'bg-green-900/30 text-green-400 border border-green-700' : 'bg-red-900/30 text-red-400 border border-red-700'">
                PIF Updates: <span x-text="pifAutoUpdateEnabled ? 'Automatic' : 'Manual'" class="ml-1"></span>
            </span>

            <span
                class="inline-flex items-center justify-between px-3 py-1 rounded-md text-sm font-medium w-full sm:w-auto"
                :class="pogoAutoUpdateEnabled ? 'bg-green-900/30 text-green-400 border border-green-700' : 'bg-red-900/30 text-red-400 border border-red-700'">
                PoGO Updates: <span x-text="pogoAutoUpdateEnabled ? 'Automatic' : 'Manual'" class="ml-1"></span>
            </span>
        </div>
    </div>

    <!-- Mobile cards (sm and down) -->
    <div class="md:hidden space-y-3">
        <template x-for="device in sortedDevices" :key="device.ip">
            <div class="bg-dark-800 border border-gray-700 rounded-lg p-4">
                <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-base font-semibold text-gray-100 truncate" x-text="device.display_name"></div>
                        <div class="text-xs text-gray-400 mt-1"
                            x-text="(device.ip && device.ip.includes(':')) ? device.ip.split(':')[0] : (device.ip || '')">
                        </div>
                    </div>

                    <div class="flex items-center gap-2 flex-none">
                        <span class="px-1.5 py-0.5 text-xs rounded-full"
                            :class="device.status ? 'bg-green-900/50 text-green-400' : 'bg-red-900/50 text-red-400'">ADB</span>
                        <span class="px-1.5 py-0.5 text-xs rounded-full"
                            :class="device.is_alive ? 'bg-green-900/50 text-green-400' : 'bg-red-900/50 text-red-400'">Alive</span>
                    </div>
                </div>

                <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
                    <div class="bg-gray-900/40 border border-gray-800 rounded px-3 py-2">
                        <div class="text-xs text-gray-400">PoGo</div>
                        <div class="text-gray-200 text-sm" x-text="(apkType === 'google' ? 'G ' : 'S ') + device.pogo"></div>
                    </div>
                    <div class="bg-gray-900/40 border border-gray-800 rounded px-3 py-2">
                        <div class="text-xs text-gray-400">MITM</div>
                        <div class="text-gray-200" x-text="device.mitm"></div>
                    </div>
                    <div class="bg-gray-900/40 border border-gray-800 rounded px-3 py-2">
                        <div class="text-xs text-gray-400">PIF</div>
                        <div class="text-gray-200" x-text="device.module"></div>
                    </div>
                    <div class="bg-gray-900/40 border border-gray-800 rounded px-3 py-2">
                        <div class="text-xs text-gray-400">Runtime</div>
                        <div class="text-gray-200" x-text="formatRuntime(device.runtime)"></div>
                    </div>
                    <div class="bg-gray-900/40 border border-gray-800 rounded px-3 py-2">
                        <div class="text-xs text-gray-400">Memory</div>
                        <div class="text-gray-200" x-text="formatMemory(device.mem_free)"></div>
                    </div>
                    <div class="bg-gray-900/40 border border-gray-800 rounded px-3 py-2">
                        <div class="text-xs text-gray-400">Token</div>
                        {% if config.device_token %}
                        {% if token_valid %}
                        <div class="text-green-400">Valid</div>
                        {% else %}
                        <div class="text-red-400">Invalid</div>
                        {% endif %}
                        {% else %}
                        <div class="text-gray-400">Not Set</div>
                        {% endif %}
                    </div>
                </div>

                <div class="mt-3 grid grid-cols-2 gap-2">
                    <div class="dropdown relative" x-data="{ open: false }">
                        <button @click="open = !open"
                            class="w-full justify-center px-3 py-2 bg-blue-900/40 hover:bg-blue-900/60 text-blue-100 rounded-md text-xs border border-blue-700 inline-flex items-center"
                            type="button">
                            PoGo
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div x-show="open" @click.away="open = false"
                            class="origin-top-left absolute left-0 mt-2 w-48 rounded-md shadow-lg bg-gray-900 ring-1 ring-black ring-opacity-5 z-20">
                            <div class="py-1 divide-y divide-gray-700">
                                <template x-for="version in pogoVersions" :key="`${version.type_label}-${version.version}`">
                                    <button type="button" @click="apkType = version.apk_type; updateDevicePogo(device.ip, version.version)"
                                        class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 w-full text-left flex items-center justify-between">
                                        <span x-text="version.type_label + ' ' + version.version"></span>
                                        <span class="text-xs px-1.5 py-0.5 rounded text-white"
                                            :class="version.apk_type === 'google' ? 'bg-blue-600' : 'bg-purple-600'"
                                            x-text="version.apk_type === 'google' ? 'Google' : 'Samsung'"></span>
                                    </button>
                                </template>
                                <template x-if="pogoVersions.length === 0">
                                    <div class="px-4 py-2 text-sm text-gray-500 text-center">
                                        Loading versions...
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown relative"
                        x-data="{ open: false, versions: [], async init() { try { const resp = await fetch('/api/all-module-versions'); const data = await resp.json(); this.versions = (data && data.all) ? data.all.filter(v => v.module_type === 'fork').slice(0, 2) : []; } catch (e) { console.error('Error fetching module versions:', e); this.versions = []; } }, formatDate(dateString) { try { const d = new Date(dateString); return d.toLocaleDateString(); } catch (e) { return dateString; } } }">
                        <button @click="open = !open"
                            class="w-full justify-center px-3 py-2 bg-purple-900/40 hover:bg-purple-900/60 text-purple-100 rounded-md text-xs border border-purple-700 inline-flex items-center"
                            type="button">
                            Module
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div x-show="open" @click.away="open = false"
                            class="origin-top-left absolute left-0 mt-2 w-72 max-w-[92vw] rounded-md shadow-lg bg-gray-900 ring-1 ring-black ring-opacity-5 z-20">
                            <div class="py-2 px-2">
                                <div class="max-h-60 overflow-y-auto divide-y divide-gray-700">
                                    <template x-for="version in versions"
                                        :key="`${version.module_type}-${version.version}`">
                                        <button type="button"
                                            @click="updateDeviceModule(device.ip, version.version, version.module_type)"
                                            class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-800 transition-colors">
                                            <div class="flex justify-between items-center">
                                                <div>
                                                    <span class="text-white font-medium" x-text="version.name"></span>
                                                    <span class="text-xs text-gray-500 ml-1"
                                                        x-text="formatDate(version.published_at)"></span>
                                                </div>
                                                <span class="px-1.5 py-0.5 text-xs rounded bg-blue-900/40 text-blue-300 border border-blue-800">Fork</span>
                                            </div>
                                        </button>
                                    </template>
                                    <div x-show="versions.length === 0"
                                        class="px-4 py-2 text-sm text-gray-500 text-center">
                                        Loading versions...
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown relative"
                        x-data="{ open: false, versions: [], async init() { try { const resp = await fetch('/api/mitm-versions'); const data = await resp.json(); this.versions = data.versions || []; } catch (e) { console.error('Error fetching MITM versions:', e); this.versions = []; } } }">
                        <button @click="open = !open"
                            class="w-full justify-center px-3 py-2 bg-green-900/40 hover:bg-green-900/60 text-green-100 rounded-md text-xs border border-green-700 inline-flex items-center"
                            type="button">
                            MITM
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div x-show="open" @click.away="open = false"
                            class="origin-top-left absolute left-0 mt-2 w-48 rounded-md shadow-lg bg-gray-900 ring-1 ring-black ring-opacity-5 z-20">
                            <div class="py-1 divide-y divide-gray-700">
                                <template x-for="version in versions" :key="version.version">
                                    <button type="button" @click="updateDeviceMitm(device.ip, version.version, version.path)"
                                        class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 w-full text-left">
                                        <span x-text="'v' + version.version"></span>
                                    </button>
                                </template>
                                <template x-if="versions.length === 0">
                                    <div class="px-4 py-2 text-sm text-gray-500 text-center">
                                        Loading versions...
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <button type="button" @click="restartDevice(device.ip)"
                        class="w-full px-3 py-2 bg-yellow-900/40 hover:bg-yellow-900/60 text-yellow-100 border border-yellow-700 rounded-md text-xs">Restart</button>
                    <button type="button" @click="rebootDevice(device.ip)"
                        class="col-span-2 w-full px-3 py-2 bg-red-900/40 hover:bg-red-900/60 text-red-100 border border-red-700 rounded-md text-xs">Reboot</button>
                </div>
            </div>
        </template>
    </div>

    <!-- Devices table -->
    <div class="hidden md:block bg-dark-800 overflow-hidden shadow rounded-lg">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-700">
                <thead class="bg-dark-800">
                    <tr>
                        <th scope="col"
                            class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('name')">
                            Name
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'name' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'name'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="hidden md:table-cell px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('ip')">
                            IP / ID
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'ip' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'ip'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('adb')">
                            ADB
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'adb' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'adb'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('alive')">
                            Alive
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'alive' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'alive'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="hidden xl:table-cell px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('runtime')">
                            Runtime
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'runtime' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'runtime'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="hidden xl:table-cell px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('control')">
                            Control
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'control' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'control'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('pogo')">
                            PoGo
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'pogo' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'pogo'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="hidden xl:table-cell px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('mitm')">
                            MITM
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'mitm' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'mitm'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="hidden xl:table-cell px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('module')">
                            PIF
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'module' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'module'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="hidden xl:table-cell px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider cursor-pointer align-top"
                            @click="sortTable('memory')">
                            Memory
                            <span class="inline-block ml-1"
                                :class="{ 'rotate-180': sortConfig.direction === 'desc' && sortConfig.key === 'memory' }">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" x-show="sortConfig.key === 'memory'">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 15l7-7 7 7" />
                                </svg>
                            </span>
                        </th>
                        <th scope="col"
                            class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider align-top">
                            Actions
                        </th>
                    </tr>
                </thead>
                <tbody class="bg-dark-800 divide-y divide-gray-700">
                    <template x-for="device in sortedDevices" :key="device.ip">
                        <tr class="hover:bg-gray-800/70 transition-colors">
                            <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-100">
                                <div x-text="device.display_name"></div>
                                <div class="md:hidden text-xs text-gray-400 mt-1"
                                    x-text="(device.ip && device.ip.includes(':')) ? device.ip.split(':')[0] : (device.ip || '')">
                                </div>
                            </td>
                            <td class="hidden md:table-cell px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-gray-300"
                                x-text="device.ip.includes(':') ? device.ip.split(':')[0] : device.ip"></td>
                            <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-gray-300">
                                <div class="relative group">
                                    <template x-if="device.status">
                                        <svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </template>
                                    <template x-if="!device.status">
                                        <div>
                                            <svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                            </svg>
                                            <template x-if="device.adb_error">
                                                <span

    <!-- Update progress modal -->
    <div id="updateModal" x-show="showUpdateModal"
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak>
        <div class="bg-dark-800 rounded-lg shadow-xl w-[92vw] sm:max-w-md sm:w-full p-6"
            @click.away="showUpdateModal = false">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-medium text-gray-100">Update in progress...</h3>
                <button @click="showUpdateModal = false" class="text-gray-400 hover:text-gray-200">

            <!-- Global progress bar -->

                        :class="updateProgress >= 100 ? 'bg-green-500' : 'bg-blue-500'"
                        :style="{ width: updateProgress + '%' }"></div>

                <p class="text-xs text-gray-400 mt-1 text-right" x-text="Math.round(updateProgress) + '%'"></p>
            </div>
            <!-- Device list -->
            <div class="max-h-60 overflow-y-auto space-y-2">
                <template x-for="device in sortedDevices.filter(d => d.in_update || updatedDevices.includes(d.ip))" :key="'update-' + device.ip">
                    <div class="flex items-center gap-3 px-3 py-2 rounded-md bg-gray-900/40">
                        <!-- Status icon -->
                        <div class="flex-none">
                            <!-- Active: spinner -->

                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                            </template>
                            <!-- Done: green check circle -->
                            <template x-if="!device.in_update && updatedDevices.includes(device.ip)">
                                <svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>

                                <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">

<script>
    // Alpine.js component for status page
    function statusPage() {
        return {
            devices: [],
            sortedDevices: [],
            versions: [],
            moduleType: 'all',
            pogoLatest: "N/A",
            pogoPrevious: "N/A",
            pogoVersions: [],
            pogoAutoUpdateEnabled: false,
            pifAutoUpdateEnabled: false,
            apkType: 'google',
            lastUpdated: new Date().toLocaleTimeString(),
            isRefreshing: false,
            showUpdateModal: false,
            updateProgress: 0,
            updatedDevices: [],
            _previouslyUpdating: [],

            sortConfig: {
                key: 'name',
                direction: 'asc'
            },
            connection: {
                status: 'connecting',
                statusText: 'Connecting...'
            },
            socket: null,
            initialized: false,

            init() {
                // Prevent duplicate initialization
                if (this.initialized) {
                    return;
                }
                this.initialized = true;

                try {
                    const el = this.$el;
                    if (el && el.dataset) {
                        this.pogoLatest = el.dataset.pogoLatest || this.pogoLatest;
                        this.pogoPrevious = el.dataset.pogoPrevious || this.pogoPrevious;
                        this.pogoAutoUpdateEnabled = el.dataset.pogoAutoUpdateEnabled === 'true';
                        this.pifAutoUpdateEnabled = el.dataset.pifAutoUpdateEnabled === 'true';
                        this.apkType = el.dataset.apkType || 'google';
                    }
                } catch (e) {
                    console.error('Error initializing status page data:', e);
                }

                // Fetch all available PoGO versions for dropdown
                this.loadPogoVersions();

                this.initWebsocket();
            },

            // Load all available PoGO versions
            loadPogoVersions() {
                fetch('/api/pogo-versions')
                    .then(response => response.json())
                    .then(data => {
                        this.pogoVersions = data.versions || [];
                        console.log('Loaded PoGO versions:', this.pogoVersions);
                    })
                    .catch(error => {
                        console.error('Error loading PoGO versions:', error);
                    });
            },

            // Initialize websocket connection
            initWebsocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/status`;

                console.log('Initializing WebSocket connection to:', wsUrl);

                // Avoid overlapping sockets (reconnect + timers). If we're already
                // connected/connecting, don't create a new one.
                try {
                    if (this.socket) {
                        if (this.socket.readyState === WebSocket.OPEN) {
                            return;
                        }
                        if (this.socket.readyState === WebSocket.CONNECTING) {
                            return;
                        }
                    }
                } catch (e) {
                    // ignore
                }

                this.connection.status = 'connecting';
                this.connection.statusText = 'Connecting...';

                // Create a raw WebSocket connection (not using HTMX WebSocket extension)
                this.socket = new WebSocket(wsUrl);

                const socket = this.socket;

                socket.onopen = () => {
                    console.log('WebSocket connection established');
                    this.connection.status = 'connected';
                    this.connection.statusText = 'Connected';

                    // Initial request for data
                    if (this.socket === socket && socket.readyState === WebSocket.OPEN) {
                        socket.send('refresh');
                    }
                };

                socket.onmessage = (event) => {
                    try {
                        console.log('WebSocket message received');
                        const data = JSON.parse(event.data);
                        this.updateData(data);
                    } catch (e) {
                        console.error('Error parsing WebSocket message:', e);
                    }
                };

                socket.onclose = () => {
                    if (this.socket !== socket) {
                        return;
                    }
                    console.log('WebSocket connection closed');
                    this.connection.status = 'disconnected';
                    this.connection.statusText = 'Disconnected';

                    // Set up AJAX polling as fallback
                    this.startAjaxPolling();

                    // Try to reconnect after a delay
                    setTimeout(() => {
                        if (this.connection.status === 'disconnected') {
                            console.log('Attempting to reconnect WebSocket...');
                            this.initWebsocket();
                        }
                    }, 5000);
                };

                socket.onerror = (error) => {
                    if (this.socket !== socket) {
                        return;
                    }
                    console.error('WebSocket error:', error);
                    this.connection.status = 'disconnected';
                    this.connection.statusText = 'Error';

                    // Switch to AJAX polling on error
                    this.startAjaxPolling();
                };

                // Add a timeout to switch to AJAX if WebSocket doesn't connect
                setTimeout(() => {
                    if (this.connection.status === 'connecting') {
                        console.log('WebSocket connection timed out, switching to AJAX polling');
                        this.connection.statusText = 'Using AJAX';
                        this.startAjaxPolling();
                    }
                }, 5000);
            },

            // AJAX polling as fallback
            startAjaxPolling() {
                if (this.connection.status !== 'connected') {
                    // Initial fetch
                    this.refreshData();

                    // Set polling interval
                    const pollInterval = setInterval(() => {
                        // Only continue polling if still disconnected
                        if (this.connection.status !== 'connected') {
                            this.refreshData();
                        } else {
                            // If we've reconnected, stop polling
                            clearInterval(pollInterval);
                        }
                    }, 60000); // Every 60 seconds
                }
            },

            // Change APK type and reload page with new type
            changeApkType() {
                // Navigate to same page with new apk_type parameter
                const url = new URL(window.location);
                url.searchParams.set('apk_type', this.apkType);
                window.location.href = url.toString();
            },

            // Refresh data using AJAX
            refreshData() {
                this.isRefreshing = true;
                const startTime = Date.now();

                fetch(`/api/status?apk_type=${this.apkType}`)
                    .then(response => response.json())
                    .then(data => {
                        this.updateData(data);

                        // Ensure minimum animation time of 500ms
                        const elapsed = Date.now() - startTime;
                        if (elapsed < 500) {
                            setTimeout(() => {
                                this.isRefreshing = false;
                            }, 500 - elapsed);
                        } else {
                            this.isRefreshing = false;
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching data:', error);
                        this.isRefreshing = false;
                    });
            },

            // Update data state
            updateData(data) {
                this.devices = data.devices || [];
                this.sortedDevices = [...this.devices];
                this.pogoLatest = data.pogo_latest || "N/A";
                this.pogoPrevious = data.pogo_previous || "N/A";
                this.pogoAutoUpdateEnabled = data.pogo_auto_update_enabled;
                this.pifAutoUpdateEnabled = data.pif_auto_update_enabled;
                // Preserve current apkType from server response or keep current
                if (data.apk_type && data.apk_type !== this.apkType) {
                    this.apkType = data.apk_type;
                }
                this.lastUpdated = new Date().toLocaleTimeString();

                // Update sort
                this.sortTable(this.sortConfig.key, false);

                // Update progress modal if update in progress
                if (data.update_in_progress) {
                    this.showUpdateModal = true;
                    this.updateProgress = data.update_progress;

                    // Track devices that finished updating
                    const currentlyUpdating = this.devices.filter(d => d.in_update).map(d => d.ip);
                    for (const ip of this._previouslyUpdating) {
                        if (!currentlyUpdating.includes(ip) && !this.updatedDevices.includes(ip)) {
                            this.updatedDevices.push(ip);
                        }
                    }
                    this._previouslyUpdating = currentlyUpdating;
                } else {
                    // Hide modal when update is complete (regardless of progress value)
                    setTimeout(() => {
                        this.showUpdateModal = false;
                        this.updatedDevices = [];
                        this._previouslyUpdating = [];
                    }, 1000);
                }
            },

            // Format memory value
            formatMemory(memKB) {
                if (!memKB || memKB <= 0) {
                    return "N/A";
                }

                // Memory comes in KB
                if (memKB < 1024) {
                    return `${(memKB).toFixed(1).replace('.', ',')} kB`;
                }

                // Convert to MB
                const memMB = memKB / 1024;
                if (memMB < 1024) {
                    return `${memMB.toFixed(2).replace('.', ',')} MB`;
                }

                // Convert to GB
                const memGB = memMB / 1024;
                return `${memGB.toFixed(2).replace('.', ',')} GB`;
            },

            // Format runtime value
            formatRuntime(seconds) {
                if (!seconds || seconds <= 0) {
                    return "N/A";
                }

                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);

                return `${hours}h ${minutes}m`;
            },

            // Format date for PIF versions
            formatDate(dateString) {
                try {
                    const date = new Date(dateString);
                    return date.toLocaleDateString();
                } catch (error) {
                    return dateString;
                }
            },

            // Sort table by column
            sortTable(key, toggleDirection = true) {
                // If clicking the same header, toggle direction
                if (toggleDirection && this.sortConfig.key === key) {
                    this.sortConfig.direction = this.sortConfig.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    this.sortConfig.key = key;
                    // Only change direction if we're toggling
                    if (toggleDirection) {
                        this.sortConfig.direction = 'asc';
                    }
                }

                const multiplier = this.sortConfig.direction === 'asc' ? 1 : -1;

                this.sortedDevices = [...this.devices].sort((a, b) => {
                    let aValue, bValue;

                    // Handle different column types
                    switch (key) {
                        case 'name':
                            aValue = a.display_name;
                            bValue = b.display_name;
                            return multiplier * aValue.localeCompare(bValue);

                        case 'ip':
                            aValue = a.ip;
                            bValue = b.ip;
                            return multiplier * aValue.localeCompare(bValue);

                        case 'adb':
                        case 'alive':
                            // Boolean values - true should come first in ascending
                            aValue = key === 'adb' ? a.status : a.is_alive;
                            bValue = key === 'adb' ? b.status : b.is_alive;
                            return multiplier * (bValue === aValue ? 0 : aValue ? -1 : 1);

                        case 'control':
                            aValue = a.control_enabled;
                            bValue = b.control_enabled;
                            return multiplier * (bValue === aValue ? 0 : aValue ? -1 : 1);

                        case 'runtime':
                            // Runtime is in seconds
                            aValue = a.runtime || 0;
                            bValue = b.runtime || 0;
                            return multiplier * (aValue - bValue);

                        case 'pogo':
                        case 'mitm':
                        case 'module':
                            aValue = a[key];
                            bValue = b[key];

                            // Handle N/A values
                            if (aValue === 'N/A' && bValue === 'N/A') return 0;
                            if (aValue === 'N/A') return multiplier;
                            if (bValue === 'N/A') return -multiplier;

                            // Compare version numbers
                            return multiplier * this.compareVersions(aValue, bValue);

                        case 'memory':
                            aValue = a.mem_free || 0;
                            bValue = b.mem_free || 0;
                            return multiplier * (aValue - bValue);

                        default:
                            return 0;
                    }
                });
            },

            // Compare version strings
            compareVersions(a, b) {
                const aParts = a.split('.').map(p => parseInt(p) || 0);
                const bParts = b.split('.').map(p => parseInt(p) || 0);

                for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                    const aPart = aParts[i] || 0;
                    const bPart = bParts[i] || 0;

                    if (aPart !== bPart) {
                        return aPart - bPart;
                    }
                }

                return 0;
            },

            // Fetch all module versions (both Fork and Fix)
            fetchAllModuleVersions() {
                fetch('/api/all-module-versions')
                    .then(response => response.json())
                    .then(data => {
                        if (data.all) {
                            this.versions = data.all;
                            // Set preferred module type as default filter
                            this.moduleType = data.preferred || 'all';
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching module versions:', error);
                    });
            },

            // Filter versions - fork only, max 2
            filteredVersions() {
                if (!this.versions) return [];
                return this.versions
                    .filter(v => v.module_type === 'fork')
                    .slice(0, 2);
            },

            // Legacy method - kept for compatibility
            fetchPifVersions() {
                fetch('/api/pif-versions')
                    .then(response => response.json())
                    .then(data => {
                        if (data.versions) {
                            this.versions = data.versions;
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching PIF versions:', error);
                    });
            },

            // NEW ACTION METHODS

            // PoGo Update All button
            pogoUpdateAll() {
                this.showUpdateModal = true;

                const formData = new FormData();
                formData.append('apk_type', this.apkType);

                fetch('/pogo/update', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => {
                        if (response.redirected) {
                            // Don't redirect - we'll just update UI
                            this.refreshData();
                        }
                    })
                    .catch(error => {
                        console.error('Error during PoGo update:', error);
                        alert('Failed to update PoGo on devices');
                        this.showUpdateModal = false;
                    });
            },

            // Update PoGo on single device
            updateDevicePogo(deviceIp, version) {
                this.showUpdateModal = true;

                const formData = new FormData();
                formData.append('device_ip', deviceIp);
                formData.append('version', version);
                formData.append('apk_type', this.apkType);

                fetch('/pogo/device-update', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => {
                        if (response.redirected) {
                            // Don't redirect - we'll just update UI
                            this.refreshData();
                        }
                    })
                    .catch(error => {
                        console.error('Error during PoGo device update:', error);
                        alert('Failed to update PoGo on device');
                        this.showUpdateModal = false;
                    });
            },

            // Update MITM on single device
            updateDeviceMitm(deviceIp, version, apkPath) {
                const formData = new FormData();
                formData.append('device_ip', deviceIp);
                formData.append('version', version);
                formData.append('apk_path', apkPath);

                fetch('/mitm/device-update', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            alert(`MITM updated to v${version} on device`);
                            this.refreshData();
                        } else {
                            alert(`Failed to update MITM: ${data.error || 'Unknown error'}`);
                        }
                    })
                    .catch(error => {
                        console.error('Error during MITM device update:', error);
                        alert('Failed to update MITM on device');
                    });
            },

            // Update Module on single device
            updateDeviceModule(deviceIp, version, moduleType) {
                this.showUpdateModal = true;

                const formData = new FormData();
                formData.append('device_ip', deviceIp);
                formData.append('version', version);
                formData.append('module_type', moduleType);

                fetch('/pif/device-update', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => {
                        if (response.redirected) {
                            // Don't redirect - we'll just update UI
                            this.refreshData();
                        }
                    })
                    .catch(error => {
                        console.error('Error during module update:', error);
                        alert('Failed to update module on device');
                        this.showUpdateModal = false;
                    });
            },

            // Restart device apps
            restartDevice(deviceIp) {
                if (!confirm('Restart apps on this device?')) return;

                this.isRefreshing = true;
                const formData = new FormData();
                formData.append('device_ip', deviceIp);

                fetch('/devices/restart-apps', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => {
                        if (response.redirected) {
                            // Don't redirect - we'll just update UI
                            this.refreshData();
                        } else {
                            this.refreshData(); // Refresh device status after operation
                        }
                    })
                    .catch(error => {
                        console.error('Error during restart:', error);
                        alert('Failed to restart device');
                    })
                    .finally(() => {
                        this.isRefreshing = false;
                    });
            },

            // Reboot device
            rebootDevice(deviceIp) {
                if (!confirm('Reboot this device? This will take some time.')) return;

                this.isRefreshing = true;
                const formData = new FormData();
                formData.append('device_ip', deviceIp);

                fetch('/devices/reboot', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => {
                        if (response.redirected) {
                            // Don't redirect - we'll just update UI
                            this.refreshData();
                        } else {
                            this.refreshData(); // Refresh device status after operation
                        }
                    })
                    .catch(error => {
                        console.error('Error during reboot:', error);
                        alert('Failed to reboot device');
                    })
                    .finally(() => {
                        this.isRefreshing = false;
                    });
            }
        };
    }
</script>
